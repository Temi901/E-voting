{% extends 'voting/base.html' %}

{% block title %}Forgot Password - E-Voting System{% endblock %}

{% block content %}
<style>
    :root {
        --ink: #0d0f14; --surface: #f5f4f0; --card: #ffffff;
        --accent: #1a3c5e; --gold: #c9a84c; --border: #e2ddd6; --radius: 12px;
    }
    .auth-container {
        min-height: calc(100vh - 72px);
        display: flex; align-items: center; justify-content: center;
        background: var(--surface); padding: 40px 20px;
    }
    .auth-box {
        width: 100%; max-width: 480px;
        background: var(--card); border-radius: var(--radius);
        padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-icon {
        width: 60px; height: 60px; margin: 0 auto 20px;
        background: rgba(26,60,94,0.1); border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.8rem;
    }
    .auth-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.8rem; font-weight: 700; color: var(--ink);
        margin-bottom: 8px;
    }
    .auth-subtitle { color: #6b7280; font-size: 0.95rem; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
        display: block; font-size: 0.9rem; font-weight: 600;
        color: var(--ink); margin-bottom: 8px;
    }
    .form-group input {
        width: 100%; padding: 12px 16px;
        border: 1.5px solid var(--border); border-radius: var(--radius);
        font-size: 0.95rem; transition: all 0.3s;
    }
    .form-group input:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(26,60,94,0.1);
    }
    .btn-submit {
        width: 100%; padding: 14px; margin-top: 10px;
        border: none; border-radius: var(--radius);
        background: var(--accent); color: white;
        font-size: 0.95rem; font-weight: 600; cursor: pointer;
        transition: all 0.3s;
    }
    .btn-submit:hover {
        background: #24527a; transform: translateY(-1px);
    }
    .back-link {
        text-align: center; margin-top: 20px;
        color: #6b7280; font-size: 0.9rem;
    }
    .back-link a {
        color: var(--accent); font-weight: 600; text-decoration: none;
    }
</style>

<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <div class="auth-icon">🔑</div>
            <h1 class="auth-title">Forgot Password?</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required 
                       placeholder="Enter your registered email">
            </div>

            <button type="submit" class="btn-submit">
                Send Reset Link
            </button>
        </form>

        <p class="back-link">
            Remember your password? <a href="{% url 'login' %}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
